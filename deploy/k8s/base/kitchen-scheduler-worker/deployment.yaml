apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-scheduler-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-scheduler-worker
  template:
    metadata:
      labels:
        app: kitchen-scheduler-worker
    spec:
      containers:
        - name: kitchen-scheduler-worker
          image: dark-kitchen/kitchen-scheduler-worker:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: dark-kitchen-config
          env:
            - name: SERVICE_NAME
              value: kitchen-scheduler-worker
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
