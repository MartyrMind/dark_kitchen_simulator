apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kubernetes-workloads
  labels:
    grafana_dashboard: "1"
data:
  kubernetes-workloads.json: |
    {
      "title": "Dark Kitchen Kubernetes Workloads",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {"type":"timeseries","title":"Pod CPU by pod","gridPos":{"x":0,"y":0,"w":12,"h":8},"targets":[{"expr":"sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"dark-kitchen\", container!=\"\", image!=\"\"}[5m]))"}]},
        {"type":"timeseries","title":"Pod memory by pod","gridPos":{"x":12,"y":0,"w":12,"h":8},"targets":[{"expr":"sum by (pod) (container_memory_working_set_bytes{namespace=\"dark-kitchen\", container!=\"\", image!=\"\"})"}]},
        {"type":"timeseries","title":"Pod restarts","gridPos":{"x":0,"y":8,"w":12,"h":8},"targets":[{"expr":"sum by (pod, container) (increase(kube_pod_container_status_restarts_total{namespace=\"dark-kitchen\"}[1h]))"}]},
        {"type":"stat","title":"Pod phase","gridPos":{"x":12,"y":8,"w":12,"h":8},"targets":[{"expr":"sum by (phase) (kube_pod_status_phase{namespace=\"dark-kitchen\"})"}]},
        {"type":"timeseries","title":"Deployment desired replicas","gridPos":{"x":0,"y":16,"w":12,"h":8},"targets":[{"expr":"kube_deployment_spec_replicas{namespace=\"dark-kitchen\"}"}]},
        {"type":"timeseries","title":"Deployment available replicas","gridPos":{"x":12,"y":16,"w":12,"h":8},"targets":[{"expr":"kube_deployment_status_replicas_available{namespace=\"dark-kitchen\"}"}]},
        {"type":"timeseries","title":"StatefulSet ready replicas","gridPos":{"x":0,"y":24,"w":12,"h":8},"targets":[{"expr":"kube_statefulset_status_replicas_ready{namespace=\"dark-kitchen\"}"}]},
        {"type":"timeseries","title":"PVC used bytes","gridPos":{"x":12,"y":24,"w":12,"h":8},"targets":[{"expr":"kubelet_volume_stats_used_bytes{namespace=\"dark-kitchen\"}"}]}
      ]
    }
