apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kds-kitchen
  labels:
    grafana_dashboard: "1"
data:
  kds-kitchen.json: |
    {
      "title": "Dark Kitchen KDS and Kitchen",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {"type":"timeseries","title":"KDS backlog","gridPos":{"x":0,"y":0,"w":12,"h":8},"targets":[{"expr":"kds_visible_backlog_size"}]},
        {"type":"timeseries","title":"Station utilization","gridPos":{"x":12,"y":0,"w":12,"h":8},"targets":[{"expr":"station_utilization_ratio"}]},
        {"type":"timeseries","title":"KDS task claims","gridPos":{"x":0,"y":8,"w":12,"h":8},"targets":[{"expr":"sum by (station_type) (rate(kds_task_claimed_total[5m]))"}]},
        {"type":"timeseries","title":"KDS task completions","gridPos":{"x":12,"y":8,"w":12,"h":8},"targets":[{"expr":"sum by (station_type) (rate(kds_task_completed_total[5m]))"}]}
      ]
    }
