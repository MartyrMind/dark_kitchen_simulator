apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: menu-service
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - dark-kitchen
  selector:
    matchLabels:
      app: menu-service
  endpoints:
    - port: http
      path: /metrics
      interval: 5s
