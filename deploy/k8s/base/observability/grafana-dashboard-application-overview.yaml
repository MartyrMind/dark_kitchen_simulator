apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-application-overview
  labels:
    grafana_dashboard: "1"
data:
  application-overview.json: |
    {
      "title": "Dark Kitchen Application Overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {"type":"timeseries","title":"HTTP RPS by service","gridPos":{"x":0,"y":0,"w":12,"h":8},"targets":[{"expr":"sum by (service) (rate(http_requests_total[1m]))"}]},
        {"type":"timeseries","title":"HTTP 5xx rate by service","gridPos":{"x":12,"y":0,"w":12,"h":8},"targets":[{"expr":"sum by (service) (rate(http_requests_total{status=~\"5..\"}[1m]))"}]},
        {"type":"timeseries","title":"p95 HTTP latency by service","gridPos":{"x":0,"y":8,"w":12,"h":8},"targets":[{"expr":"histogram_quantile(0.95, sum by (service, le) (rate(http_request_duration_seconds_bucket[5m])))"}]},
        {"type":"stat","title":"Prometheus target up","gridPos":{"x":12,"y":8,"w":12,"h":8},"targets":[{"expr":"up"}]}
      ]
    }
