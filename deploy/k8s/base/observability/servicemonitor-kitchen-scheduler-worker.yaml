apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kitchen-scheduler-worker
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - dark-kitchen
  selector:
    matchLabels:
      app: kitchen-scheduler-worker
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 5s
