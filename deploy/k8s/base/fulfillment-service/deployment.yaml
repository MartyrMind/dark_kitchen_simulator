apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulfillment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fulfillment-service
  template:
    metadata:
      labels:
        app: fulfillment-service
    spec:
      containers:
        - name: fulfillment-service
          image: dark-kitchen/fulfillment-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: dark-kitchen-config
          env:
            - name: SERVICE_NAME
              value: fulfillment-service
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dark-kitchen-secret
                  key: FULFILLMENT_DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
