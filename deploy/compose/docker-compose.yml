name: dark-kitchen-demo

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo:
    image: mongo:7
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  kitchen-service:
    build:
      context: ../..
      dockerfile: services/kitchen-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      DATABASE_URL: ${KITCHEN_DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/kitchen_service}
      FULFILLMENT_SERVICE_URL: ${FULFILLMENT_SERVICE_URL:-http://fulfillment-service:8000}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
      MONGO_DATABASE: ${MONGO_DATABASE:-dark_kitchen_events}
      MONGO_EVENTS_ENABLED: ${MONGO_EVENTS_ENABLED:-true}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-3}
    ports:
      - "${KITCHEN_HOST_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 30

  menu-service:
    build:
      context: ../..
      dockerfile: services/menu-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      DATABASE_URL: ${MENU_DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/menu_service}
    ports:
      - "${MENU_HOST_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 30

  fulfillment-service:
    build:
      context: ../..
      dockerfile: services/fulfillment-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      DATABASE_URL: ${FULFILLMENT_DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/fulfillment_service}
      KITCHEN_SERVICE_URL: ${KITCHEN_SERVICE_URL:-http://kitchen-service:8000}
      MENU_SERVICE_URL: ${MENU_SERVICE_URL:-http://menu-service:8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_TASK_STREAM_PREFIX: ${REDIS_TASK_STREAM_PREFIX:-stream:kitchen}
      REDIS_PUBLISH_ENABLED: ${REDIS_PUBLISH_ENABLED:-true}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
      MONGO_DATABASE: ${MONGO_DATABASE:-dark_kitchen_events}
      MONGO_EVENTS_ENABLED: ${MONGO_EVENTS_ENABLED:-true}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-3}
    ports:
      - "${FULFILLMENT_HOST_PORT:-8003}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kitchen-service:
        condition: service_healthy
      menu-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 30

  kitchen-scheduler-worker:
    build:
      context: ../..
      dockerfile: services/kitchen-scheduler-worker/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_STREAM_PATTERNS: ${REDIS_STREAM_PATTERNS:-stream:kitchen:*:station:*}
      REDIS_CONSUMER_GROUP: ${REDIS_CONSUMER_GROUP:-group:kitchen-scheduler-workers}
      FULFILLMENT_SERVICE_URL: ${FULFILLMENT_SERVICE_URL:-http://fulfillment-service:8000}
      KITCHEN_SERVICE_URL: ${KITCHEN_SERVICE_URL:-http://kitchen-service:8000}
      WORKER_ID: ${WORKER_ID:-scheduler-worker-1}
      STREAM_SCAN_INTERVAL_MS: ${STREAM_SCAN_INTERVAL_MS:-500}
      XREAD_BLOCK_MS: ${XREAD_BLOCK_MS:-5000}
      XREAD_COUNT: ${XREAD_COUNT:-10}
      MAX_DISPATCH_ATTEMPTS: ${MAX_DISPATCH_ATTEMPTS:-5}
      DISPATCH_BACKOFF_BASE_MS: ${DISPATCH_BACKOFF_BASE_MS:-1000}
      DISPATCH_BACKOFF_MAX_MS: ${DISPATCH_BACKOFF_MAX_MS:-30000}
      HTTP_TIMEOUT_MS: ${HTTP_TIMEOUT_MS:-3000}
      PROMETHEUS_PORT: 9090
    ports:
      - "${WORKER_HOST_PORT:-9091}:9090"
    depends_on:
      redis:
        condition: service_healthy
      fulfillment-service:
        condition: service_healthy
      kitchen-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/health"]
      interval: 5s
      timeout: 5s
      retries: 30

  station-simulator-service:
    profiles:
      - demo
    build:
      context: ../..
      dockerfile: services/station-simulator-service/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      KITCHEN_SERVICE_URL: ${KITCHEN_SERVICE_URL:-http://kitchen-service:8000}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-3}
      SIMULATOR_ENABLED: ${SIMULATOR_ENABLED:-true}
      SIMULATOR_SPEED_FACTOR: ${SIMULATOR_SPEED_FACTOR:-120}
      SIMULATOR_POLL_INTERVAL_MS: ${SIMULATOR_POLL_INTERVAL_MS:-1000}
      SIMULATOR_WORKERS_CONFIG: ${SIMULATOR_WORKERS_CONFIG:-11111111-1111-1111-1111-111111111101:1,11111111-1111-1111-1111-111111111103:1}
    ports:
      - "${SIMULATOR_HOST_PORT:-8004}:8000"
    depends_on:
      kitchen-service:
        condition: service_healthy
      fulfillment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 30

  prometheus:
    image: prom/prometheus:v2.55.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    depends_on:
      kitchen-service:
        condition: service_healthy
      menu-service:
        condition: service_healthy
      fulfillment-service:
        condition: service_healthy
      kitchen-scheduler-worker:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  grafana_data:
